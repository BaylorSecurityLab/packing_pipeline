definitions:
  - &acprotect_std
    packer_family: "acprotect"
    packer_name: "acprotect_std"
    version: "Standard (installer)"
    arch_origin: "x86"
    supported_input_arch: "PE32"
    supported_output_arch: "PE32"
    dependencies: []
    tags: ["GUI", "Protector", "Anti-Debug", "Crypter", "Commercial"]
    binary_path: "./packers/acprotect/ACProtect/ACProtect.exe"
    binary_sha256: "f082359b90eed2aed56403667527e038b84204021d281e09057496aae177b058"
    source_url: "https://archive.org/download/tucows_304741_ACProtect/acpr_std.exe"
    license: "Commercial (Trial, preserved via archive.org/Tucows)"
    notes: "ACProtect Standard by risco. A GUI-based PE protector using RSA public-key cryptography for registration key generation, with anti-dump and anti-debug features. Installer (acpr_std.exe) also retained at ./packers/acprotect/acpr_std.exe."
    size_kb: "998"
    output_behavior: "explicit"
    type: "Type IV"
    type_ex: "ACProtect employs RSA-based key verification, code encryption, CRC checks, and anti-dump — full interleaved execution where the protection stub remains active at runtime."
    known_issues:
      - "Automation: GUI-only; cannot be scripted via CLI."
      - "Trial: Limited features in trial/standard edition."

