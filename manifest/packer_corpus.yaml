# ==========================================
# SECTION 2: TEST CASES (The Execution Plan)
# Reference the anchors above using '<<: *anchor_name'
# ==========================================
test_cases:
  # --- UPX Test Group ---
  - id: "UPX_001_FAST"
    <<: *upx_v396
    command_label: "Fast Compression"
    cli_template: "{bin} -1 -o {out} {in}"
    validation:
      allow_x64_switch: false

  - id: "UPX_002_BEST"
    <<: *upx_v396
    command_label: "Max Compression (LZMA)"
    cli_template: "{bin} --best --lzma -o {out} {in}"
    validation:
      allow_x64_switch: false


  # --- MPRESS Test Group ---
  - id: "MPRESS_001_STD"
    <<: *mpress_v219
    command_label: "Standard Packing"
    cli_template: "{bin} -s {in}"
    notes: "Warning: MPRESS overwrites file in place."
    validation:
      allow_x64_switch: false