test_cases:
  # ==========================================
  # SECTION 2: TEST CASES (The Execution Plan)
  # Reference the anchors above using '<<: *anchor_name'
  # ==========================================

  # --- XComp Test Group ---
  - id: "XCOMP_001_DEFAULT"
    <<: *xcomp_v097
    command_label: "Default Compression"
    # -b: Don't create backup file (runner handles backups)
    cli_template: "{bin} -b {in}"
    validation:
      allow_x64_switch: false
      allow_x86_switch: false

  - id: "XCOMP_002_MAX_COMPRESSION"
    <<: *xcomp_v097
    command_label: "Max Compression (Level 9)"
    cli_template: "{bin} -b -l:9 {in}"
    validation:
      allow_x64_switch: false
      allow_x86_switch: false

  - id: "XCOMP_003_LZSS_ALGO"
    <<: *xcomp_v097
    command_label: "Force LZSS Algorithm"
    cli_template: "{bin} -b -lzs {in}"
    validation:
      allow_x64_switch: false
      allow_x86_switch: false

  - id: "XCOMP_004_STRIP_EXPORTS"
    <<: *xcomp_v097
    command_label: "Delete Exports Section"
    cli_template: "{bin} -b -e {in}"
    validation:
      allow_x64_switch: false
      allow_x86_switch: false

  # --- Upack Test Group ---
  - id: "UPACK_001_DEFAULT"
