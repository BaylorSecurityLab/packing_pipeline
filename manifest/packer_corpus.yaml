  - &alushpacker
    packer_family: "alushpacker"
    packer_name: "alushpacker"
    version: "1.0.0"
    arch_origin: "x86/x64"
    supported_input_arch: ["PE32", "PE64"]
    supported_output_arch: ["PE32", "PE64"]
    dependencies: []
    tags: ["CLI", "Reflective", "Open Source", "Security"]
    binary_path: "./packers/alush_packer/packer.exe"
    binary_sha256: "56458d9ffd7e11e329a5962cd5cde279f7ad635c1673e6657a51195bc8ef02fe"
    source_url: "https://github.com/Alon-Alush/AlushPacker"
    license: "MIT"
    notes: "Open-source reflective PE packer written in C. Features manual loading, LZAV compression, XTEA encryption, and full TLS/SEH support."
    size_kb: "52.50"
    output_behavior: "input_dir_suffix"
    type: "Type V"
    type_ex: "It manually maps, decrypts, and decompresses the payload directly into memory at runtime, fitting the Type V incremental/staged execution definition."
    known_issues:
      - "Heuristics: High entropy in the newly created '.packed' section can trigger static AV/EDR detections (though this can be mitigated by moving the packed data into a header payload)."
      - "Usability: The project currently requires you to compile the CLI builder from source before use."
      - "CLI: The -o flag is documented but broken (exits 1 with 'Invalid input path!'). Use positional input only; output is always <input>_packed.exe."

