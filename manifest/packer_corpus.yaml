  # --- Amber v3.0 Test Group ---
  - id: "AMBER_V30_001_DEFAULT"
    <<: *amber_v30
    command_label: "Default (CRC resolver)"
    # amber v3 (Go flag parser) has no -o output flag; it writes "<in>_packed.exe"
    # next to {in}, which the runner detects via its amber-style output search.
    # -build (not -b) is the real flag; -ignore-checks is required or amber
    # rejects real-world installers on its integrity check.
    cli_template: "{bin} -f {in} -build -ignore-checks"
    validation:
      allow_x64_switch: false
      allow_x86_switch: false

  - id: "AMBER_V30_002_IAT"
    <<: *amber_v30
    command_label: "IAT Resolver"
    cli_template: "{bin} -f {in} -iat -build -ignore-checks"
