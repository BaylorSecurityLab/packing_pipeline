# ==========================================
# SECTION 2: TEST CASES (The Execution Plan)
# Reference the anchors above using '<<: *anchor_name'
# ==========================================
test_cases:
  # --- UPX Test Group ---
  - id: "UPX_001_FAST"
    <<: *upx_v396                 # <--- INHERITS ALL UPX METADATA AUTOMATICALLY
    command_label: "Fast Compression"
    cli_template: "{bin} -1 -o {out} {in}"
    expected_overhead_kb: -100
    validation:
      allow_x64_switch: false     # Fail if it switches to 64-bit
      max_size_mb: 5.0            # Email constraint

  - id: "UPX_002_BEST"
    <<: *upx_v396                 # <--- INHERITS AGAIN (No Repetition!)
    command_label: "Max Compression (LZMA)"
    cli_template: "{bin} --best --lzma -o {out} {in}"
    expected_overhead_kb: -400
    validation:
      allow_x64_switch: false
      max_size_mb: 5.0

  # --- MPRESS Test Group ---
  - id: "MPRESS_001_STD"
    <<: *mpress_v219
    command_label: "Standard Packing"
    cli_template: "{bin} -s {in}" # Note: MPRESS often overwrites input, script must handle copy
    notes: "Warning: MPRESS overwrites file in place."