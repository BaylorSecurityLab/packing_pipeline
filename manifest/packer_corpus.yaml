test_cases:
  # ==========================================
  # SECTION 2: TEST CASES (The Execution Plan)
  # Reference the anchors above using '<<: *anchor_name'
  # ==========================================

  # --- Pakkero Test Group ---
  - id: "PAKKERO_001_DEFAULT"
    <<: *pakkero_v071
    command_label: "Default Packing (No Compression)"
    # Syntax: pakkero -file <in> -o <out>
    cli_template: "{bin} -file {in} -o {out}"
    validation:
      allow_x64_switch: true

  - id: "PAKKERO_002_COMPRESSED"
    <<: *pakkero_v071
    command_label: "Packing with UPX Compression"
    # Syntax: pakkero -file <in> -o <out> -c
    cli_template: "{bin} -file {in} -o {out} -c"
    validation:
      allow_x64_switch: true

  - id: "PAKKERO_003_OFFSET_SHIFT"
    <<: *pakkero_v071
