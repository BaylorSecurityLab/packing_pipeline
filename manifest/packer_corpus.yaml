# ==========================================
# SECTION 1: PACKER DEFINITIONS (The Source of Truth)
# Define packers here once. Use '&name' to create a reusable anchor.
# ==========================================
definitions:
  - &exe32pack_v142
    packer_name: "exe32pack"
    version: "1.42"
    arch_origin: "x32"
    supported_input_arch: "PE32"
    supported_output_arch: "PE32"
    dependencies: [ ]
    tags: [ "Compression", "CLI" ]
    binary_path: "./packers/exe32pack/exe32pack.exe"
    binary_sha256: "e81d42faae9cd704f678d400d71caae0e252ea500c7daf5920ceeb66d039ddf5"
    source_url: "https://exe32pack.apponic.com/download/"
    license: "Shareware"
    notes: "File command output: MS-DOS executable PE32 executable (console) Intel 80386"
    size_kb: "49 KB"

# ==========================================
# SECTION 2: TEST CASES (The Execution Plan)
# Reference the anchors above using '<<: *anchor_name'
# ==========================================
test_cases:
  # --- exe32pack Test Group ---
  - id: "EXE32PACK_001_DEFAULT"
    <<: *exe32pack_v142
    command_label: "Default Auto-Compression"
    # Syntax: exe32pack [opts] <filein> [fileout]
    cli_template: "{bin} /M:0 {in} {out}"
    validation:
      allow_x64_switch: false

  - id: "EXE32PACK_002_MEDIUM"
    <<: *exe32pack_v142
    command_label: "Medium Compression (Tiny Overhead)"
    cli_template: "{bin} /M:1 {in} {out}"
    validation:
      allow_x64_switch: false

  - id: "EXE32PACK_003_TIGHT"
    <<: *exe32pack_v142
    command_label: "Tight Compression (Large Overhead)"
    cli_template: "{bin} /M:2 {in} {out}"
    validation:
      allow_x64_switch: false

  - id: "EXE32PACK_004_REALIGN"
    <<: *exe32pack_v142
    command_label: "Realign Only (No Compression)"
    cli_template: "{bin} /R {in} {out}"
    validation:
      allow_x64_switch: false