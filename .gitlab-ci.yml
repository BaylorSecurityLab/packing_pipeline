# .gitlab-ci.yml
image: python:3.13

# Define the stages of your pipeline
stages:
  - maintenance

# Variables to configure the commit author
variables:
  GIT_AUTHOR_EMAIL: "gitlab-ci-bot@example.com"
  GIT_AUTHOR_NAME: "GitLab CI Bot"

# ---------------------------------------------------
# JOB 1: Equivalent to generate_stats.yml
# ---------------------------------------------------
generate_stats:
  stage: maintenance
  # Equivalent to: if: "!contains(github.event.head_commit.message, '[skip ci]')"
  # GitLab handles [skip ci] automatically in commit messages, so we just check the branch.
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - manifest/packer_corpus.yaml
        - utils/dataset_stats.py
        - .gitlab-ci.yml
  script:
    # 1. Install uv (replacing astral-sh/setup-uv)
    - pip install uv

    # 2. Install project (replacing uv sync)
    - uv sync --all-extras --dev

    # 3. Generate Statistics
    - uv run python utils/dataset_stats.py --json manifest/dataset_stats.json

    # 4. Commit logic (replacing stefanzweifel/git-auto-commit-action)
    - git config --global user.email "$GIT_AUTHOR_EMAIL"
    - git config --global user.name "$GIT_AUTHOR_NAME"
    - git add manifest/dataset_stats.json
    # Check if there are changes; if not, exit gracefully
    - |-
      if git diff --staged --quiet; then
        echo "No changes to commit."
      else
        git commit -m "🤖 Auto-update dataset statistics [skip ci]"
        # Pushing requires a Project Access Token (see Step 2 below)
        git push "https://oauth2:${GIT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main
      fi

# ---------------------------------------------------
# JOB 2: Equivalent to sync_manifest.yml
# ---------------------------------------------------
update_manifest:
  stage: maintenance
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - pip install uv
    - uv sync --all-extras --dev
    - uv run python utils/update_manifest.py

    # Commit logic
    - git config --global user.email "$GIT_AUTHOR_EMAIL"
    - git config --global user.name "$GIT_AUTHOR_NAME"
    - git add manifest/packer_corpus.yaml
    - |-
      if git diff --staged --quiet; then
        echo "No changes to commit."
      else
        git commit -m "🤖 Auto-update manifest: Sync version & authors [skip ci]"
        git push "https://oauth2:${GIT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main
      fi
