# .gitlab-ci.yml
image: python:3.13

stages:
  - maintenance

variables:
  GIT_AUTHOR_EMAIL: "gitlab-ci-bot@example.com"
  GIT_AUTHOR_NAME: "GitLab CI Bot"

# ---------------------------------------------------
# JOB 1: Generate Stats (Windows PowerShell Version)
# ---------------------------------------------------
generate_stats:
  stage: maintenance
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - manifest/packer_corpus.yaml
        - utils/dataset_stats.py
        - .gitlab-ci.yml
  script:
    - pip install uv
    - uv sync --all-extras --dev
    - uv run python utils/dataset_stats.py --json manifest/dataset_stats.json

    # Configure Git (Removed --global to avoid messing up your machine settings)
    - git config user.email "$env:GIT_AUTHOR_EMAIL"
    - git config user.name "$env:GIT_AUTHOR_NAME"

    - git add manifest/dataset_stats.json

    # PowerShell Logic: Check for changes
    # We use --name-only because --quiet returns exit code 1 on changes, which crashes the build.
    - $changes = git diff --staged --name-only
    - |
      if ($changes) {
        Write-Host "Changes detected. Committing..."
        git commit -m "🤖 Auto-update dataset statistics [skip ci]"
        git push "https://oauth2:$($env:GIT_ACCESS_TOKEN)@$($env:CI_SERVER_HOST)/$($env:CI_PROJECT_PATH).git" HEAD:main
      } else {
        Write-Host "No changes to commit."
      }

# ---------------------------------------------------
# JOB 2: Sync Manifest (Windows PowerShell Version)
# ---------------------------------------------------
update_manifest:
  stage: maintenance
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - pip install uv
    - uv sync --all-extras --dev
    - uv run python utils/update_manifest.py

    - git config user.email "$env:GIT_AUTHOR_EMAIL"
    - git config user.name "$env:GIT_AUTHOR_NAME"

    - git add manifest/packer_corpus.yaml

    # PowerShell Logic
    - $changes = git diff --staged --name-only
    - |
      if ($changes) {
        Write-Host "Changes detected. Committing..."
        git commit -m "🤖 Auto-update manifest: Sync version & authors [skip ci]"
        git push "https://oauth2:$($env:GIT_ACCESS_TOKEN)@$($env:CI_SERVER_HOST)/$($env:CI_PROJECT_PATH).git" HEAD:main
      } else {
        Write-Host "No changes to commit."
      }
