# .gitlab-ci.yml
image: python:3.13

stages:
  - maintenance

# ---------------------------------------------------
# GLOBAL VARIABLES
# ---------------------------------------------------
variables:
  GIT_AUTHOR_EMAIL: "gitlab-ci-bot@example.com"
  GIT_AUTHOR_NAME: "GitLab CI Bot"
  PYTHONIOENCODING: "utf-8"

# ---------------------------------------------------
# JOB 1: Generate Stats
# ---------------------------------------------------
generate_stats:
  stage: maintenance
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - manifest/packer_corpus.yaml
        - utils/dataset_stats.py
        - .gitlab-ci.yml
  script:
    - pip install uv
    - uv sync --all-extras --dev
    - uv run python utils/dataset_stats.py --json manifest/dataset_stats.json

    # Configure Git (Bash uses $VAR or ${VAR}, not $env:VAR)
    - git config user.email "$GIT_AUTHOR_EMAIL"
    - git config user.name "$GIT_AUTHOR_NAME"

    - git add manifest/dataset_stats.json

    # Check for changes (Bash uses $(command) for command substitution)
    - CHANGES=$(git diff --staged --name-only)
    - |
      if [ -n "$CHANGES" ]; then
        echo "Changes detected. Committing..."
        git commit -m "🤖 Auto-update dataset statistics [skip ci]"
        git push "https://oauth2:${GIT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main
      else
        echo "No changes to commit."
      fi

# ---------------------------------------------------
# JOB 2: Sync Manifest
# ---------------------------------------------------
update_manifest:
  stage: maintenance
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - pip install uv
    - uv sync --all-extras --dev
    - uv run python utils/update_manifest.py

    - git config user.email "$GIT_AUTHOR_EMAIL"
    - git config user.name "$GIT_AUTHOR_NAME"

    - git add manifest/packer_corpus.yaml

    # Check for changes
    - CHANGES=$(git diff --staged --name-only)
    - |
      if [ -n "$CHANGES" ]; then
        echo "Changes detected. Committing..."
        git commit -m "🤖 Auto-update manifest: Sync version & authors [skip ci]"
        git push "https://oauth2:${GIT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main
      else
        echo "No changes to commit."
      fi